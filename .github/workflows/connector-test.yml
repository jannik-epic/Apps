name: Connector Test (Teams + SharePoint)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install modules
        shell: pwsh
        run: |
          $ProgressPreference='SilentlyContinue'
          Install-Module MicrosoftTeams -RequiredVersion 6.5.0 -Scope CurrentUser -Force -AllowClobber
          Install-Module PnP.PowerShell -RequiredVersion 2.12.0 -Scope CurrentUser -Force -AllowClobber
      - name: Test Teams + SharePoint app-only
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.PURVIEW_CONNECTOR_PFX_B64 }}
          PFX_PWD: ${{ secrets.PURVIEW_CONNECTOR_PFX_PWD }}
          APP_ID: 'eefa9c93-5548-419d-833c-d04ee78c0293'
          TENANT: '57415788-595e-4889-901a-4ad5bcecbfe4'
          ORG: 'epicfusionlabs.onmicrosoft.com'
        run: |
          $ErrorActionPreference='Stop'; $ProgressPreference='SilentlyContinue'
          $bytes=[Convert]::FromBase64String($env:PFX_B64)
          $cert=[System.Security.Cryptography.X509Certificates.X509Certificate2]::new($bytes,$env:PFX_PWD)
          Write-Host '== TEAMS =='
          try {
            Import-Module MicrosoftTeams
            Connect-MicrosoftTeams -ApplicationId $env:APP_ID -Certificate $cert -TenantId $env:TENANT | Out-Null
            foreach ($c in 'Get-CsTeamsMeetingPolicy','Get-CsTeamsMessagingPolicy','Get-CsTeamsAppPermissionPolicy','Get-CsTeamsCallingPolicy','Get-CsTeamsChannelsPolicy','Get-CsTenantFederationConfiguration','Get-CsTeamsClientConfiguration') {
              try { $n=@(& $c -ErrorAction Stop).Count; Write-Host ("{0,-40} {1}" -f $c,$n) } catch { Write-Host ("{0,-40} ERR: {1}" -f $c, $_.Exception.Message.Substring(0,[Math]::Min(70,$_.Exception.Message.Length))) }
            }
            Disconnect-MicrosoftTeams -ErrorAction SilentlyContinue
          } catch { Write-Host ('Teams connect FAILED: ' + $_.Exception.Message) }
          Write-Host '== SHAREPOINT (PnP) =='
          try {
            Import-Module PnP.PowerShell
            Connect-PnPOnline -Url 'https://epicfusionlabs-admin.sharepoint.com' -ClientId $env:APP_ID -Certificate $cert -Tenant $env:ORG | Out-Null
            foreach ($c in 'Get-PnPTenant','Get-PnPTenantSite','Get-PnPHomeSite','Get-PnPOrgAssetsLibrary') {
              try { $n=@(& $c -ErrorAction Stop).Count; Write-Host ("{0,-40} {1}" -f $c,$n) } catch { Write-Host ("{0,-40} ERR: {1}" -f $c, $_.Exception.Message.Substring(0,[Math]::Min(70,$_.Exception.Message.Length))) }
            }
            Disconnect-PnPOnline -ErrorAction SilentlyContinue
          } catch { Write-Host ('SharePoint connect FAILED: ' + $_.Exception.Message) }
          Write-Host '== CONNECTOR TEST DONE =='
