name: Deploy Winget App to Intune

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Winget Package ID (e.g., Microsoft.VisualStudioCode)'
        required: true
        type: string
      package_source:
        description: 'WinGet source for this package'
        required: false
        type: choice
        default: 'winget'
        options:
          - 'winget'
          - 'msstore'
      package_name:
        description: 'Package display name (optional compatibility input)'
        required: false
        type: string
      version:
        description: 'Requested version or latest'
        required: false
        type: string
      installer_architecture:
        description: 'Target CPU architecture for the offline installer download'
        required: false
        type: choice
        default: 'x64'
        options:
          - 'x86'
          - 'x64'
          - 'arm64'
      validation_enabled:
        description: 'Run install/detection/uninstall + footprint diff in the runner before uploading to Intune'
        required: false
        type: boolean
        default: true
      dry_run:
        description: 'Plan only; do not create the Intune app'
        required: false
        type: boolean
        default: false
      app_name:
        description: 'Display Name for the app in Intune'
        required: false
        type: string
      app_description:
        description: 'App description'
        required: false
        type: string
      app_publisher:
        description: 'Publisher override for the Intune app'
        required: false
        type: string
      app_icon_base64:
        description: 'Base64 encoded app icon (optional)'
        required: false
        type: string
      install_context:
        description: 'Installation context'
        required: true
        type: choice
        default: 'system'
        options:
          - 'system'
          - 'user'
      use_psadt:
        description: 'Use PowerShell App Deployment Toolkit (PSADT)'
        required: true
        type: boolean
        default: true
      detection_script:
        description: 'Custom detection script (optional)'
        required: false
        type: string
      detection_script_b64:
        description: 'Base64 encoded custom detection script (optional)'
        required: false
        type: string
      install_script_b64:
        description: 'Base64 encoded install script or command override (optional)'
        required: false
        type: string
      uninstall_script_b64:
        description: 'Base64 encoded uninstall script or command override (optional)'
        required: false
        type: string
      pre_install_script_b64:
        description: 'Base64 encoded pre-install script (optional)'
        required: false
        type: string
      post_install_script_b64:
        description: 'Base64 encoded post-install script (optional)'
        required: false
        type: string
      assignment_json:
        description: 'JSON mobileAppAssignments payload generated by Modern Dev Mgmt'
        required: false
        type: string
      assignment_summary:
        description: 'Human-readable assignment plan summary'
        required: false
        type: string
      modern_dev_mgmt_context_b64:
        description: 'Base64 encoded Modern Dev Mgmt run context'
        required: false
        type: string
      apps_to_close:
        description: 'Rendered close-app list from the selected Modern Dev Mgmt app setting (process.exe=Friendly Name, comma separated)'
        required: false
        type: string
      update_only_b64:
        # Dual-app pattern: when present, a SECOND
        # Intune mobileApp must be created with this script as its custom
        # detection rule, intent=required, scope=all devices, display name
        # suffixed with "(Update-Only)". The script reports detected for absent
        # or current installs and not-detected only for outdated installs, so the
        # required companion remediates outdated devices without clean-installing.
        description: 'Base64 encoded PowerShell detection script for the Update-Only Required companion app'
        required: false
        type: string
      wave_set_id:
        description: 'Modern Dev Mgmt wave set id for this deployment (informational)'
        required: false
        type: string
env:
  AZURE_TENANT_ID: 'f849cde7-f11d-4ef5-a31d-7fca98b21bf5'
  AZURE_CLIENT_ID: 'a34f2806-b6f7-4d11-98f6-b32894396ca8'
  INTUNE_API_URL: 'https://graph.microsoft.com/v1.0'

jobs:
  deploy-winget-app:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login using OIDC
        uses: azure/login@v3
        with:
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          client-id: ${{ env.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      - name: Get Azure Access Token
        id: get_token
        run: |
          $token = (az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv)
          echo "::add-mask::$token"
          echo "access_token=$token" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Fetch Winget Package Information
        id: winget_info
        run: |
          ./scripts/winget/Fetch-WingetPackageInfo.ps1 -PackageId "${{ github.event.inputs.package_id }}" -PackageSource "${{ github.event.inputs.package_source || 'winget' }}"
        shell: pwsh

      - name: Resolve and download installer binary (offline package)
        id: resolve_installer
        # Try the offline path for BOTH winget and msstore. Free msstore apps
        # download fine via 'winget download --source msstore'; licensed/paid
        # Store apps will fail at this step and the workflow will fall back to
        # the legacy winget-client wrapper (continue-on-error so we don't kill
        # the run when an msstore download is rights-restricted).
        if: ${{ github.event.inputs.dry_run != 'true' || true }}
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Stop'
          $arch = "${{ github.event.inputs.installer_architecture }}"
          if (-not $arch) { $arch = 'x64' }
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) { $version = "${{ steps.winget_info.outputs.version }}" }
          $source = "${{ github.event.inputs.package_source || 'winget' }}"
          $stagingDir = Join-Path $PWD 'winget-installer-files'
          try {
            ./scripts/winget/Download-WingetInstaller.ps1 `
              -PackageId "${{ github.event.inputs.package_id }}" `
              -Version $version `
              -PackageSource $source `
              -Architecture $arch `
              -OutputDirectory $stagingDir
            $metadataPath = Join-Path $stagingDir 'installer-metadata.json'
            if (Test-Path -LiteralPath $metadataPath) {
              Add-Content -Path $env:GITHUB_OUTPUT -Value "metadata_path=$metadataPath"
              Add-Content -Path $env:GITHUB_OUTPUT -Value "staging_dir=$stagingDir"
              Add-Content -Path $env:GITHUB_OUTPUT -Value "offline=true"
            } else {
              Write-Host "::warning::Offline installer metadata missing; falling back to runtime install path."
            }
          } catch {
            Write-Host "::warning::Offline installer download failed ($($_.Exception.Message)); falling back to runtime install path."
          }

      - name: Generate Installation Scripts
        id: generate_scripts
        env:
          DETECTION_SCRIPT_B64: ${{ github.event.inputs.detection_script_b64 }}
          INSTALL_SCRIPT_B64: ${{ github.event.inputs.install_script_b64 }}
          UNINSTALL_SCRIPT_B64: ${{ github.event.inputs.uninstall_script_b64 }}
          PRE_INSTALL_SCRIPT_B64: ${{ github.event.inputs.pre_install_script_b64 }}
          POST_INSTALL_SCRIPT_B64: ${{ github.event.inputs.post_install_script_b64 }}
          APP_PUBLISHER: ${{ github.event.inputs.app_publisher }}
        run: |
          $publisher = $env:APP_PUBLISHER
          if (-not $publisher) { $publisher = "${{ steps.winget_info.outputs.publisher }}" }
          $params = @{
            PackageId = "${{ github.event.inputs.package_id }}"
            PackageSource = "${{ github.event.inputs.package_source || 'winget' }}"
            UsePSADT = ("${{ github.event.inputs.use_psadt }}" -eq "true")
            InstallContext = "${{ github.event.inputs.install_context }}"
            Publisher = $publisher
            Version = "${{ steps.winget_info.outputs.version }}"
          }
          if ("${{ github.event.inputs.app_name }}") {
            $params.AppName = "${{ github.event.inputs.app_name }}"
          }
          if ("${{ github.event.inputs.detection_script }}") {
            $params.CustomDetectionScript = "${{ github.event.inputs.detection_script }}"
          }
          if ($env:DETECTION_SCRIPT_B64) {
            $params.CustomDetectionScriptBase64 = $env:DETECTION_SCRIPT_B64
          }
          if ($env:INSTALL_SCRIPT_B64) {
            $params.InstallScriptBase64 = $env:INSTALL_SCRIPT_B64
          }
          if ($env:UNINSTALL_SCRIPT_B64) {
            $params.UninstallScriptBase64 = $env:UNINSTALL_SCRIPT_B64
          }
          if ($env:PRE_INSTALL_SCRIPT_B64) {
            $params.PreInstallScriptBase64 = $env:PRE_INSTALL_SCRIPT_B64
          }
          if ($env:POST_INSTALL_SCRIPT_B64) {
            $params.PostInstallScriptBase64 = $env:POST_INSTALL_SCRIPT_B64
          }
          if ("${{ steps.resolve_installer.outputs.metadata_path }}") {
            $params.InstallerMetadataPath = "${{ steps.resolve_installer.outputs.metadata_path }}"
          }
          ./scripts/winget/Generate-InstallationScripts.ps1 @params
        shell: pwsh

      - name: Inject Show-ADTInstallationWelcome -CloseApps prologue
        if: ${{ github.event.inputs.apps_to_close != '' }}
        shell: pwsh
        env:
          APPS_TO_CLOSE: ${{ github.event.inputs.apps_to_close }}
        run: |
          $ErrorActionPreference = 'Stop'
          $apps = ($env:APPS_TO_CLOSE -split '[,;\r\n]+' | ForEach-Object { $_.Trim() } | Where-Object { $_ }) -join ','
          if (-not $apps) { return }
          # PSADT v4 emits Show-ADTInstallationWelcome; in non-PSADT runtimes we
          # fall back to Stop-Process on the same process-name list so we never
          # block-execute outside a PSADT session and never break dry-run.
          $processList = (($apps -split ',') | ForEach-Object { ($_ -split '=', 2)[0].Trim() -replace '\.exe$', '' } | Where-Object { $_ }) -join ','
          $prologue = @"
          # --- Modern Dev Mgmt: close running apps before install ---
          if (Get-Command Show-ADTInstallationWelcome -ErrorAction SilentlyContinue) {
              Show-ADTInstallationWelcome -CloseApps "$apps" -BlockExecution -Silent
          } else {
              foreach (`$proc in @('$processList' -split ',')) {
                  if (`$proc) { Get-Process -Name `$proc -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue }
              }
          }
          # --- end close-apps prologue ---
          "@
          foreach ($target in @('install_script.ps1','uninstall_script.ps1')) {
            if (Test-Path -LiteralPath $target -PathType Leaf) {
              $existing = Get-Content -LiteralPath $target -Raw
              Set-Content -LiteralPath $target -Value ($prologue + [Environment]::NewLine + $existing) -Encoding UTF8
              Write-Host "Injected close-apps prologue into $target"
            }
          }

      - name: VM validation — baseline snapshot
        id: validate_baseline
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path .modern-dev-mgmt/validation | Out-Null
          ./scripts/common/Capture-WindowsFootprint.ps1 -OutputPath .modern-dev-mgmt/validation/before.json
          Add-Content -Path $env:GITHUB_OUTPUT -Value "baseline_path=.modern-dev-mgmt/validation/before.json"

      - name: VM validation — install (offline package)
        id: validate_install
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' }}
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          # Stage scripts + Files/ next to each other so install_script.ps1 can
          # resolve Files/<installer> via PSScriptRoot — identical to how Intune
          # lays out the .intunewin on the device.
          $workspace = $PWD.Path
          $stageDir = Join-Path $workspace 'validation-stage'
          $validationDir = Join-Path $workspace '.modern-dev-mgmt/validation'
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Force -Path $validationDir | Out-Null
          Copy-Item install_script.ps1   "$stageDir/" -Force
          Copy-Item uninstall_script.ps1 "$stageDir/" -Force
          Copy-Item detection_script.ps1 "$stageDir/" -Force
          $filesSrc = Join-Path "${{ steps.resolve_installer.outputs.staging_dir }}" 'Files'
          if (Test-Path -LiteralPath $filesSrc) {
            Copy-Item $filesSrc "$stageDir/" -Recurse -Force
          }
          $installLog = Join-Path $validationDir 'install.log'
          $installScript = Join-Path $stageDir 'install_script.ps1'
          Start-Transcript -Path $installLog -Force | Out-Null
          $exit = 0
          try {
            & powershell.exe -ExecutionPolicy Bypass -NoProfile -File $installScript
            $exit = $LASTEXITCODE
          } catch {
            $exit = 1
            Write-Host "Install threw: $($_.Exception.Message)"
          }
          Stop-Transcript | Out-Null
          Add-Content -Path $env:GITHUB_OUTPUT -Value "install_exit_code=$exit"

      - name: VM validation — detection (assert installed)
        id: validate_detection
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' && steps.validate_install.outcome == 'success' }}
        shell: pwsh
        continue-on-error: true
        run: |
          $detect = Join-Path $PWD.Path 'validation-stage/detection_script.ps1'
          & powershell.exe -ExecutionPolicy Bypass -NoProfile -File $detect
          $exit = $LASTEXITCODE
          Add-Content -Path $env:GITHUB_OUTPUT -Value "detection_exit_code=$exit"

      - name: VM validation — after-install snapshot + footprint diff
        id: validate_footprint
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' && steps.validate_install.outcome == 'success' }}
        shell: pwsh
        run: |
          ./scripts/common/Capture-WindowsFootprint.ps1 -OutputPath .modern-dev-mgmt/validation/after-install.json
          ./scripts/common/Diff-WindowsFootprint.ps1 `
            -BeforePath .modern-dev-mgmt/validation/before.json `
            -AfterPath  .modern-dev-mgmt/validation/after-install.json `
            -OutputPath .modern-dev-mgmt/validation/footprint.json

      - name: VM validation — uninstall
        id: validate_uninstall
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' && steps.validate_install.outcome == 'success' }}
        shell: pwsh
        continue-on-error: true
        run: |
          $validationDir = Join-Path $PWD.Path '.modern-dev-mgmt/validation'
          $uninstallLog = Join-Path $validationDir 'uninstall.log'
          $uninstall = Join-Path $PWD.Path 'validation-stage/uninstall_script.ps1'
          New-Item -ItemType Directory -Force -Path $validationDir | Out-Null
          Start-Transcript -Path $uninstallLog -Force | Out-Null
          $exit = 0
          try {
            & powershell.exe -ExecutionPolicy Bypass -NoProfile -File $uninstall
            $exit = $LASTEXITCODE
          } catch {
            $exit = 1
            Write-Host "Uninstall threw: $($_.Exception.Message)"
          }
          Stop-Transcript | Out-Null
          Add-Content -Path $env:GITHUB_OUTPUT -Value "uninstall_exit_code=$exit"

      - name: VM validation — leftover diff
        id: validate_leftovers
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' && steps.validate_uninstall.outcome == 'success' }}
        shell: pwsh
        run: |
          ./scripts/common/Capture-WindowsFootprint.ps1 -OutputPath .modern-dev-mgmt/validation/after-uninstall.json
          ./scripts/common/Diff-WindowsFootprint.ps1 `
            -BeforePath .modern-dev-mgmt/validation/before.json `
            -AfterPath  .modern-dev-mgmt/validation/after-uninstall.json `
            -OutputPath .modern-dev-mgmt/validation/leftovers.json

      - name: VM validation — assemble report
        id: validation_report
        if: ${{ github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' }}
        shell: pwsh
        env:
          INSTALL_EXIT:   ${{ steps.validate_install.outputs.install_exit_code }}
          DETECT_EXIT:    ${{ steps.validate_detection.outputs.detection_exit_code }}
          UNINSTALL_EXIT: ${{ steps.validate_uninstall.outputs.uninstall_exit_code }}
          INSTALL_OUTCOME:   ${{ steps.validate_install.outcome }}
          DETECT_OUTCOME:    ${{ steps.validate_detection.outcome }}
          UNINSTALL_OUTCOME: ${{ steps.validate_uninstall.outcome }}
        run: |
          function ParseInt($s) { if ($s -and $s -match '^-?\d+$') { return [int]$s } else { return $null } }
          $report = [ordered]@{
            installExitCode    = ParseInt $env:INSTALL_EXIT
            detectionExitCode  = ParseInt $env:DETECT_EXIT
            uninstallExitCode  = ParseInt $env:UNINSTALL_EXIT
            installOutcome     = $env:INSTALL_OUTCOME
            detectionOutcome   = $env:DETECT_OUTCOME
            uninstallOutcome   = $env:UNINSTALL_OUTCOME
            footprintAvailable = (Test-Path '.modern-dev-mgmt/validation/footprint.json')
            leftoversAvailable = (Test-Path '.modern-dev-mgmt/validation/leftovers.json')
            installLogPath     = '.modern-dev-mgmt/validation/install.log'
            uninstallLogPath   = '.modern-dev-mgmt/validation/uninstall.log'
          }
          $report | ConvertTo-Json -Depth 8 | Set-Content '.modern-dev-mgmt/validation/report.json' -Encoding UTF8
          # Decide pass/fail: install must succeed. Detection/uninstall failures
          # are warnings — they get surfaced in the UI but do not block the
          # Intune upload (the .intunewin is independent of the runner's ability
          # to uninstall a single-user installer).
          if ($env:INSTALL_OUTCOME -ne 'success') {
            Write-Host "::error::Install step failed in validation runner — aborting Intune upload."
            exit 1
          }
          Write-Host "✅ Validation report assembled at .modern-dev-mgmt/validation/report.json"

      - name: VM validation — upload artifacts
        if: ${{ always() && github.event.inputs.validation_enabled != 'false' && steps.resolve_installer.outputs.offline == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: validation-${{ github.run_id }}
          path: .modern-dev-mgmt/validation/
          if-no-files-found: ignore
          retention-days: 14

      - name: Create Intune Application
        id: create_app
        env:
          APP_PUBLISHER: ${{ github.event.inputs.app_publisher }}
        run: |
          $packageSource = "${{ github.event.inputs.package_source || 'winget' }}"
          $packageSourceLabel = if ($packageSource -eq "msstore") { "Microsoft Store via WinGet" } else { "WinGet" }
          $publisher = $env:APP_PUBLISHER
          if (-not $publisher) { $publisher = "${{ steps.winget_info.outputs.publisher }}" }
          $architecture = "x64"
          $contextB64 = "${{ github.event.inputs.modern_dev_mgmt_context_b64 }}"
          if ($contextB64) {
            try {
              $rawContext = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($contextB64 -replace '\s+', '')))
              $context = $rawContext | ConvertFrom-Json
              if ($context.architecture) { $architecture = [string]$context.architecture }
              elseif ($context.package -and $context.package.architecture) { $architecture = [string]$context.package.architecture }
            } catch {
              Write-Warning "Could not parse Modern Dev Mgmt context architecture, using x64"
            }
          }
          $params = @{
            AccessToken = "${{ steps.get_token.outputs.access_token }}"
            PackageId = "${{ github.event.inputs.package_id }}"
            Publisher = $publisher
            Version = "${{ steps.winget_info.outputs.version }}"
            InstallContext = "${{ github.event.inputs.install_context }}"
            UsePSADT = ("${{ github.event.inputs.use_psadt }}" -eq "true")
            DryRun = ("${{ github.event.inputs.dry_run }}" -eq "true")
            IntuneApiUrl = "$env:INTUNE_API_URL"
            PackageSource = $packageSourceLabel
            Architecture = $architecture
          }
          if ("${{ github.event.inputs.app_name }}") {
            $params.AppName = "${{ github.event.inputs.app_name }}"
          }
          if ("${{ github.event.inputs.app_description }}") {
            $params.AppDescription = "${{ github.event.inputs.app_description }}"
          } elseif ("${{ steps.winget_info.outputs.description }}") {
            $params.AppDescription = "${{ steps.winget_info.outputs.description }}"
          }
          if ("${{ github.event.inputs.app_icon_base64 }}") {
            $params.AppIconBase64 = "${{ github.event.inputs.app_icon_base64 }}"
          }
          if ("${{ steps.resolve_installer.outputs.staging_dir }}") {
            $params.PackageFilesDirectory = "${{ steps.resolve_installer.outputs.staging_dir }}"
          }
          if ("${{ steps.resolve_installer.outputs.metadata_path }}") {
            $params.InstallerMetadataPath = "${{ steps.resolve_installer.outputs.metadata_path }}"
          }
          ./scripts/winget/Create-IntuneApplication.ps1 @params
        shell: powershell

      - name: Apply assignment template
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.assignment_json != '' }}
        env:
          ASSIGNMENT_JSON: ${{ github.event.inputs.assignment_json }}
        run: |
          ./scripts/common/Assign-IntuneMobileApp.ps1 -AccessToken "${{ steps.get_token.outputs.access_token }}" -AppId "${{ steps.create_app.outputs.app_id }}" -AssignmentJson $env:ASSIGNMENT_JSON -IntuneApiUrl "$env:INTUNE_API_URL"
        shell: pwsh

      - name: Create Update-Only Required companion app
        id: create_update_only_app
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.update_only_b64 != '' }}
        shell: powershell
        env:
          UPDATE_ONLY_B64: ${{ github.event.inputs.update_only_b64 }}
          APP_PUBLISHER: ${{ github.event.inputs.app_publisher }}
        run: |
          $ErrorActionPreference = "Stop"
          $raw = $env:UPDATE_ONLY_B64
          if ($raw.Contains(",")) { $raw = $raw.Split(",", 2)[1] }
          [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($raw -replace '\s+', ''))) |
            Set-Content -Path "detection_script.ps1" -Encoding UTF8
          $baseName = "${{ github.event.inputs.app_name }}"
          if (-not $baseName) { $baseName = "${{ steps.create_app.outputs.app_name }}" }
          if (-not $baseName) { $baseName = "${{ github.event.inputs.package_id }}" }
          $publisher = $env:APP_PUBLISHER
          if (-not $publisher) { $publisher = "${{ steps.winget_info.outputs.publisher }}" }
          $architecture = "x64"
          $contextB64 = "${{ github.event.inputs.modern_dev_mgmt_context_b64 }}"
          if ($contextB64) {
            try {
              $rawContext = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(($contextB64 -replace '\s+', '')))
              $context = $rawContext | ConvertFrom-Json
              if ($context.architecture) { $architecture = [string]$context.architecture }
              elseif ($context.package -and $context.package.architecture) { $architecture = [string]$context.package.architecture }
            } catch {
              Write-Warning "Could not parse Modern Dev Mgmt context architecture, using x64"
            }
          }
          $params = @{
            AccessToken = "${{ steps.get_token.outputs.access_token }}"
            PackageId = "${{ github.event.inputs.package_id }}"
            AppName = "$baseName (Update-Only)"
            Publisher = $publisher
            Version = "${{ steps.winget_info.outputs.version }}"
            InstallContext = "${{ github.event.inputs.install_context }}"
            UsePSADT = ("${{ github.event.inputs.use_psadt }}" -eq "true")
            DryRun = $false
            IntuneApiUrl = "$env:INTUNE_API_URL"
            PackageSource = "Winget update-only companion"
            PackageNotes = "Modern Dev Mgmt Update-Only Required companion. Primary Intune app: ${{ steps.create_app.outputs.app_id }}. Workflow: ${{ github.run_id }}."
            Architecture = $architecture
          }
          if ("${{ github.event.inputs.app_description }}") {
            $params.AppDescription = "${{ github.event.inputs.app_description }} (Update-Only Required companion)"
          } elseif ("${{ steps.winget_info.outputs.description }}") {
            $params.AppDescription = "${{ steps.winget_info.outputs.description }} (Update-Only Required companion)"
          }
          if ("${{ github.event.inputs.app_icon_base64 }}") {
            $params.AppIconBase64 = "${{ github.event.inputs.app_icon_base64 }}"
          }
          ./scripts/winget/Create-IntuneApplication.ps1 @params

      - name: Assign Update-Only companion to all devices
        if: ${{ github.event.inputs.dry_run != 'true' && steps.create_update_only_app.outputs.app_id != '' }}
        shell: pwsh
        run: |
          $assignment = @{
            mobileAppAssignments = @(
              @{
                '@odata.type' = '#microsoft.graph.mobileAppAssignment'
                intent = 'required'
                target = @{ '@odata.type' = '#microsoft.graph.allDevicesAssignmentTarget' }
                settings = @{
                  '@odata.type' = '#microsoft.graph.win32LobAppAssignmentSettings'
                  notifications = 'showAll'
                  restartSettings = $null
                  deliveryOptimizationPriority = 'notConfigured'
                }
              }
            )
          } | ConvertTo-Json -Depth 20
          ./scripts/common/Assign-IntuneMobileApp.ps1 -AccessToken "${{ steps.get_token.outputs.access_token }}" -AppId "${{ steps.create_update_only_app.outputs.app_id }}" -AssignmentJson $assignment -IntuneApiUrl "$env:INTUNE_API_URL"

      - name: Summary
        env:
          ASSIGNMENT_SUMMARY: ${{ github.event.inputs.assignment_summary }}
        run: |
          if ("${{ github.event.inputs.dry_run }}" -eq "true") {
            Write-Host "✅ Dry run completed. Scripts were generated but no Intune app was created."
            if ($env:ASSIGNMENT_SUMMARY) {
              Write-Host "Assignment plan: $env:ASSIGNMENT_SUMMARY"
            }
            exit 0
          }
          $success = "${{ steps.create_app.outputs.success }}"
          $appName = "${{ steps.create_app.outputs.app_name }}"
          $appId = "${{ steps.create_app.outputs.app_id }}"
          $packageId = "${{ github.event.inputs.package_id }}"

          if ($success -eq "true") {
            Write-Host "✅ Successfully deployed Winget application to Intune!"
            Write-Host "📱 App Name: $appName"
            Write-Host "🆔 App ID: $appId"
            Write-Host "📦 Package ID: $packageId"
            if ("${{ steps.create_update_only_app.outputs.app_id }}") {
              Write-Host "🔁 Update-Only companion App ID: ${{ steps.create_update_only_app.outputs.app_id }}"
            }
            Write-Host ""
            Write-Host "The application is now available in the Microsoft Intune admin center."
          } else {
            Write-Host "❌ Failed to deploy application to Intune."
            exit 1
          }
        shell: pwsh

      - name: Persist Modern Dev Mgmt run result
        if: ${{ github.event.inputs.dry_run != 'true' && steps.create_app.outputs.app_id != '' }}
        shell: pwsh
        env:
          MODERN_DEVMGMT_CONTEXT_B64: ${{ github.event.inputs.modern_dev_mgmt_context_b64 }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase
          $runDir = ".modern-dev-mgmt/runs"
          New-Item -ItemType Directory -Force -Path $runDir | Out-Null
          $context = $null
          if ($env:MODERN_DEVMGMT_CONTEXT_B64) {
            try {
              $contextJson = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($env:MODERN_DEVMGMT_CONTEXT_B64))
              $context = $contextJson | ConvertFrom-Json
            } catch {
              Write-Warning "Could not decode Modern Dev Mgmt context: $($_.Exception.Message)"
            }
          }
          # Pull validation artifacts into the persisted run result so the
          # desktop UI can render the Robopack-style App Documentation page
          # (files added, registry values added, leftovers, install/uninstall
          # exit codes, raw logs).
          $validation = $null
          $validationReportPath = ".modern-dev-mgmt/validation/report.json"
          if (Test-Path -LiteralPath $validationReportPath) {
            try {
              $validation = Get-Content -LiteralPath $validationReportPath -Raw | ConvertFrom-Json
            } catch {
              Write-Warning "Could not parse validation report: $($_.Exception.Message)"
            }
          }
          # Capture last 200 lines of each transcript so the UI can show what
          # actually went wrong without forcing the user to download artifacts.
          function Get-LogTail([string]$Path, [int]$N = 200) {
            if (-not (Test-Path -LiteralPath $Path)) { return $null }
            try {
              $lines = Get-Content -LiteralPath $Path -Tail $N -ErrorAction Stop
              return ($lines -join [Environment]::NewLine)
            } catch { return $null }
          }
          if ($validation) {
            $validation | Add-Member -NotePropertyName installLogTail   -NotePropertyValue (Get-LogTail '.modern-dev-mgmt/validation/install.log')   -Force
            $validation | Add-Member -NotePropertyName uninstallLogTail -NotePropertyValue (Get-LogTail '.modern-dev-mgmt/validation/uninstall.log') -Force
          }
          $footprint = $null
          if (Test-Path -LiteralPath ".modern-dev-mgmt/validation/footprint.json") {
            try { $footprint = Get-Content -LiteralPath ".modern-dev-mgmt/validation/footprint.json" -Raw | ConvertFrom-Json } catch {}
          }
          $leftovers = $null
          if (Test-Path -LiteralPath ".modern-dev-mgmt/validation/leftovers.json") {
            try { $leftovers = Get-Content -LiteralPath ".modern-dev-mgmt/validation/leftovers.json" -Raw | ConvertFrom-Json } catch {}
          }
          $result = [ordered]@{
            workflowRunId = "${{ github.run_id }}"
            workflow = "deploy-winget-app.yml"
            packageManager = "winget"
            packageId = "${{ github.event.inputs.package_id }}"
            appId = "${{ steps.create_app.outputs.app_id }}"
            updateOnlyAppId = "${{ steps.create_update_only_app.outputs.app_id }}"
            appName = "${{ steps.create_app.outputs.app_name }}"
            status = "success"
            createdAt = (Get-Date).ToUniversalTime().ToString("o")
            context = $context
            validation = $validation
            footprint = $footprint
            leftovers = $leftovers
          }
          $result | ConvertTo-Json -Depth 12 | Set-Content -Path "$runDir/${{ github.run_id }}.json" -Encoding UTF8
          git add "$runDir/${{ github.run_id }}.json"
          if ($context -and $context.patchRunId) {
            $patchDir = ".modern-dev-mgmt/patch-runs"
            New-Item -ItemType Directory -Force -Path $patchDir | Out-Null
            $patchPath = "$patchDir/$($context.patchRunId).json"
            $result | ConvertTo-Json -Depth 12 | Set-Content -Path $patchPath -Encoding UTF8
            git add $patchPath
          }
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: record Modern Dev Mgmt run ${{ github.run_id }}"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          } else {
            Write-Host "no changes"
          }