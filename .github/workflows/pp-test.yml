name: PP Connector Test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Power Platform app-only (REST, cert JWT)
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.PURVIEW_CONNECTOR_PFX_B64 }}
          PFX_PWD: ${{ secrets.PURVIEW_CONNECTOR_PFX_PWD }}
          APP_ID: 'eefa9c93-5548-419d-833c-d04ee78c0293'
          TENANT: '57415788-595e-4889-901a-4ad5bcecbfe4'
        run: |
          $ErrorActionPreference='Stop'
          $bytes=[Convert]::FromBase64String($env:PFX_B64)
          $flags=[System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
          $cert=[System.Security.Cryptography.X509Certificates.X509Certificate2]::new($bytes,$env:PFX_PWD,$flags)
          $rsa=[System.Security.Cryptography.X509Certificates.RSACertificateExtensions]::GetRSAPrivateKey($cert)
          Write-Host ("private key present: {0}" -f ($null -ne $rsa))
          function b64url($b){([Convert]::ToBase64String($b) -replace '\+','-' -replace '/','_').TrimEnd('=')}
          $tokenEp="https://login.microsoftonline.com/$($env:TENANT)/oauth2/v2.0/token"
          $now=[DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          $x5t=b64url($cert.GetCertHash())
          $header=@{alg='RS256';typ='JWT';x5t=$x5t}|ConvertTo-Json -Compress
          $payload=@{aud=$tokenEp;iss=$env:APP_ID;sub=$env:APP_ID;jti=[guid]::NewGuid().ToString();nbf=$now;exp=$now+600}|ConvertTo-Json -Compress
          $u=(b64url([Text.Encoding]::UTF8.GetBytes($header)))+'.'+(b64url([Text.Encoding]::UTF8.GetBytes($payload)))
          $sig=$rsa.SignData([Text.Encoding]::UTF8.GetBytes($u),[Security.Cryptography.HashAlgorithmName]::SHA256,[Security.Cryptography.RSASignaturePadding]::Pkcs1)
          $assertion="$u."+(b64url $sig)
          $body=@{client_id=$env:APP_ID;client_assertion_type='urn:ietf:params:oauth:client-assertion-type:jwt-bearer';client_assertion=$assertion;scope='https://api.bap.microsoft.com/.default';grant_type='client_credentials'}
          try {
            $tok=(Invoke-RestMethod -Method POST -Uri $tokenEp -Body $body -ContentType 'application/x-www-form-urlencoded').access_token
            Write-Host 'app-only BAP token: acquired'
            $h=@{Authorization="Bearer $tok"}
            foreach ($api in @(
              @{n='Environments'; u='https://api.bap.microsoft.com/providers/Microsoft.BusinessAppPlatform/scopes/admin/environments?api-version=2021-04-01'},
              @{n='DLP policies v2'; u='https://api.bap.microsoft.com/providers/PowerPlatform.Governance/v2/policies?api-version=2021-04-01'},
              @{n='Tenant settings'; u='https://api.bap.microsoft.com/providers/Microsoft.BusinessAppPlatform/scopes/admin/tenantSettings?api-version=2020-10-01'}
            )) {
              try { $r=Invoke-RestMethod -Method ($(if($api.n -like '*settings*'){'POST'}else{'GET'})) -Uri $api.u -Headers $h; $c=if($r.value){@($r.value).Count}else{1}; Write-Host ("{0,-18} {1}" -f $api.n,$c) }
              catch { Write-Host ("{0,-18} ERR: {1}" -f $api.n, $_.Exception.Message.Substring(0,[Math]::Min(90,$_.Exception.Message.Length))) }
            }
          } catch { Write-Host ('PP token FAILED: ' + $_.Exception.Message) }
          Write-Host '== PP TEST DONE =='
